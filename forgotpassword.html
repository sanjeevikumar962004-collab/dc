<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Recover Credentials | BILDIUM Construction</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Styled Assets -->
<link href="auth-dashboard.css" rel="stylesheet"/>
</head>
<body>
<div class="auth-wrapper">
<div class="auth-container">
<div class="auth-header">
<a class="auth-logo" href="index.html">
<img alt="BILDIUM Logo" src="whitelogo.webp"/>
</a>
<h2>Recover Password</h2>
<p>Input registered spatial briefing address to trigger a security reset dispatch</p>
</div>
<form class="auth-form" id="forgot-form" novalidate="">
<div class="form-group">
<label for="email">Briefing Email Address</label>
<input id="email" placeholder="mail@example.com" required="" type="email"/>
<span class="error-text">Credential email is required to recover passwords.</span>
</div>
<button class="auth-btn" type="submit">Submit Reset Request</button>
</form>
<div class="auth-footer">
<span>Recall credentials?</span>
<a href="login.html">Log In</a>
</div>
</div>
</div>
<!-- Core Logic Engine -->
<script src="auth.js"></script>
</body>
</html>
